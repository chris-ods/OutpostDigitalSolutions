# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0

env:
  # Firebase client config — Outpost Digital Solutions Firebase project
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyDzOehZykTrdgDpHDq6v9m7Qm7GQf5IuSg"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "outpostdigitalsolutions.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "outpostdigitalsolutions"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "outpostdigitalsolutions.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "3015430856"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:3015430856:web:4d1d26b6e0d43f0d530bfd"
    availability:
      - BUILD
      - RUNTIME

  # Google Analytics (preserved from previous ODS apphosting config)
  - variable: GA_PROPERTY_ID
    value: "528518036"
    availability:
      - RUNTIME

  - variable: GA_SERVICE_ACCOUNT_EMAIL
    value: "firebase-adminsdk-fbsvc@outpostdigitalsolutions.iam.gserviceaccount.com"
    availability:
      - RUNTIME

  - variable: GA_PRIVATE_KEY
    secret: GA_PRIVATE_KEY
    availability:
      - RUNTIME

  # NOTE: ODS_ENCRYPTION_KEY and CRON_SECRET are intentionally NOT set here.
  # They are only required by /api/admin/secrets and /api/cron/archive-chats —
  # both will throw at runtime if invoked until you provision them in Secret Manager:
  #
  #   firebase apphosting:secrets:set ods-encryption-key
  #   firebase apphosting:secrets:set cron-secret
  #   firebase apphosting:secrets:grantaccess ods-encryption-key --backend <backend-id>
  #   firebase apphosting:secrets:grantaccess cron-secret --backend <backend-id>
  #
  # Then re-add the env entries below.
